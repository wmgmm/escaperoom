<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Whiteboard background -->
  <rect width="400" height="300" fill="#f5f0e8"/>
  <!-- Frame -->
  <rect x="10" y="10" width="380" height="280" fill="none" stroke="#222" stroke-width="6" rx="4"/>
  <rect x="18" y="18" width="364" height="264" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Scrawl lines (handwritten notes simulation) -->
  <line x1="40" y1="55" x2="220" y2="55" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="75" x2="180" y2="75" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="95" x2="260" y2="95" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="115" x2="140" y2="115" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Diagram: box with arrows -->
  <rect x="40" y="140" width="80" height="44" fill="none" stroke="#333" stroke-width="2"/>
  <text x="80" y="167" font-family="monospace" font-size="11" fill="#333" text-anchor="middle">STEP 1</text>
  <line x1="120" y1="162" x2="160" y2="162" stroke="#333" stroke-width="2" marker-end="url(#arrowB)"/>
  <rect x="160" y="140" width="80" height="44" fill="none" stroke="#333" stroke-width="2"/>
  <text x="200" y="167" font-family="monospace" font-size="11" fill="#333" text-anchor="middle">STEP 2</text>
  <line x1="240" y1="162" x2="280" y2="162" stroke="#333" stroke-width="2"/>
  <rect x="280" y="140" width="80" height="44" fill="none" stroke="#C00" stroke-width="2.5"/>
  <text x="320" y="167" font-family="monospace" font-size="11" fill="#C00" text-anchor="middle">FAIL?</text>
  <!-- More scrawl lines below diagram -->
  <line x1="40" y1="210" x2="310" y2="210" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="228" x2="200" y2="228" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="246" x2="250" y2="246" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Circled item -->
  <ellipse cx="165" cy="75" rx="22" ry="12" fill="none" stroke="#C00" stroke-width="2"/>
  <!-- URGENT stamp -->
  <rect x="240" y="48" width="130" height="42" rx="4" fill="none" stroke="#CC0000" stroke-width="3" transform="rotate(-3 305 69)"/>
  <text x="305" y="74" font-family="'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#CC0000" text-anchor="middle" transform="rotate(-3 305 69)">URGENT</text>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
