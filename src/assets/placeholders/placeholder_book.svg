<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#2c1810"/>
  <!-- Book shadow -->
  <ellipse cx="205" cy="278" rx="155" ry="12" fill="#000" opacity="0.5"/>
  <!-- Left page -->
  <rect x="50" y="30" width="145" height="220" rx="2" fill="#f5f0e8"/>
  <rect x="50" y="30" width="145" height="220" fill="none" stroke="#c8b89a" stroke-width="1.5"/>
  <!-- Left page content: lines of text -->
  <line x1="68" y1="58" x2="178" y2="58" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="72" x2="178" y2="72" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="86" x2="155" y2="86" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="100" x2="178" y2="100" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="114" x2="178" y2="114" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="128" x2="148" y2="128" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Underlined key passage (left page) -->
  <line x1="68" y1="148" x2="178" y2="148" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="162" x2="178" y2="162" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="176" x2="155" y2="176" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Yellow underline highlight -->
  <rect x="68" y="162" width="110" height="4" fill="#FFFF00" opacity="0.7"/>
  <!-- Page number left -->
  <text x="120" y="238" font-family="'Georgia', serif" font-size="10" fill="#aaa" text-anchor="middle">46</text>
  <!-- Spine / gutter shadow -->
  <rect x="190" y="30" width="20" height="220" fill="url(#spineGrad)"/>
  <defs>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8b89a" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#000" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8b89a" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Right page -->
  <rect x="205" y="30" width="145" height="220" rx="2" fill="#f0ebe0"/>
  <rect x="205" y="30" width="145" height="220" fill="none" stroke="#c8b89a" stroke-width="1.5"/>
  <!-- Right page lines -->
  <line x1="220" y1="58" x2="335" y2="58" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="220" y1="72" x2="335" y2="72" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="220" y1="86" x2="310" y2="86" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chapter heading -->
  <line x1="220" y1="108" x2="335" y2="108" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="220" y1="118" x2="335" y2="118" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="220" y1="128" x2="295" y2="128" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <!-- Sub-text lines -->
  <line x1="220" y1="148" x2="335" y2="148" stroke="#bbb" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="220" y1="162" x2="335" y2="162" stroke="#bbb" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="220" y1="176" x2="310" y2="176" stroke="#bbb" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="220" y1="190" x2="335" y2="190" stroke="#bbb" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Sticky note on right page -->
  <rect x="270" y="62" width="70" height="56" rx="2" fill="#FFFF00" opacity="0.92" transform="rotate(3 305 90)"/>
  <line x1="278" y1="80" x2="332" y2="80" stroke="#aaa" stroke-width="1" transform="rotate(3 305 90)"/>
  <line x1="278" y1="92" x2="332" y2="92" stroke="#aaa" stroke-width="1" transform="rotate(3 305 90)"/>
  <line x1="278" y1="104" x2="310" y2="104" stroke="#aaa" stroke-width="1" transform="rotate(3 305 90)"/>
  <!-- Page number right -->
  <text x="270" y="238" font-family="'Georgia', serif" font-size="10" fill="#aaa" text-anchor="middle">47</text>
</svg>
