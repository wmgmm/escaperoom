<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a1a"/>
  <!-- Crumpled paper shadow -->
  <polygon points="35,265 55,25 370,18 365,275" fill="#d4c9b0" opacity="0.15"/>
  <!-- Letter paper (slightly skewed for crumpled effect) -->
  <polygon points="40,270 58,22 368,20 362,272" fill="#f2ead8"/>
  <!-- Paper fold lines (crumple effect) -->
  <line x1="58" y1="22" x2="250" y2="140" stroke="#c8bfa8" stroke-width="1" opacity="0.6"/>
  <line x1="368" y1="20" x2="200" y2="130" stroke="#c8bfa8" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="270" x2="280" y2="130" stroke="#c8bfa8" stroke-width="1" opacity="0.4"/>
  <!-- Letterhead -->
  <rect x="70" y="40" width="260" height="3" fill="#333"/>
  <text x="200" y="62" font-family="'Georgia', serif" font-size="11" fill="#333" text-anchor="middle" font-weight="bold">UNIVERSITY OF CASTLETON</text>
  <text x="200" y="77" font-family="'Georgia', serif" font-size="9" fill="#666" text-anchor="middle">OFFICE OF RESEARCH &amp; INNOVATION</text>
  <!-- Date line -->
  <text x="310" y="100" font-family="monospace" font-size="9" fill="#444" text-anchor="end">14 November 2025</text>
  <!-- Salutation -->
  <text x="75" y="118" font-family="'Georgia', serif" font-size="10" fill="#333">Dear Dr Albright,</text>
  <!-- Body lines -->
  <line x1="75" y1="135" x2="340" y2="135" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="75" y1="150" x2="340" y2="150" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="75" y1="165" x2="290" y2="165" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="75" y1="182" x2="340" y2="182" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="75" y1="197" x2="260" y2="197" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Highlighted / underlined suspicious line -->
  <line x1="75" y1="165" x2="290" y2="165" stroke="#FFFF00" stroke-width="7" opacity="0.4"/>
  <!-- Signature area -->
  <text x="75" y="232" font-family="'Georgia', serif" font-size="10" fill="#555">Yours sincerely,</text>
  <path d="M75,255 Q110,240 145,255 Q160,262 175,248" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="75" y1="258" x2="175" y2="258" stroke="#aaa" stroke-width="0.8"/>
  <text x="75" y="272" font-family="monospace" font-size="9" fill="#555">Prof. A. Whitmore — Research Governance</text>
  <!-- REJECTED stamp -->
  <g transform="rotate(12, 250, 200)">
    <rect x="195" y="155" width="140" height="55" rx="5" fill="none" stroke="#CC0000" stroke-width="4"/>
    <text x="265" y="183" font-family="'Arial Black', sans-serif" font-size="26" font-weight="900" fill="#CC0000" text-anchor="middle" opacity="0.88">REJECTED</text>
  </g>
</svg>
