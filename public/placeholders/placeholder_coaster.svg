<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Yellow background -->
  <rect width="400" height="300" fill="#FFFF00"/>
  <!-- Shadow -->
  <circle cx="208" cy="162" r="112" fill="#000" opacity="0.12"/>
  <!-- Coaster main circle -->
  <circle cx="200" cy="150" r="110" fill="#e8e0d0" stroke="#333" stroke-width="4"/>
  <!-- Coaster rings -->
  <circle cx="200" cy="150" r="100" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <circle cx="200" cy="150" r="88" fill="none" stroke="#ccc" stroke-width="1"/>
  <circle cx="200" cy="150" r="70" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <!-- Cork texture dots -->
  <circle cx="175" cy="130" r="3" fill="#c8b89a" opacity="0.7"/>
  <circle cx="220" cy="125" r="2.5" fill="#c8b89a" opacity="0.7"/>
  <circle cx="188" cy="165" r="3.5" fill="#c8b89a" opacity="0.6"/>
  <circle cx="215" cy="170" r="2" fill="#c8b89a" opacity="0.7"/>
  <circle cx="230" cy="145" r="3" fill="#c8b89a" opacity="0.5"/>
  <circle cx="165" cy="158" r="2" fill="#c8b89a" opacity="0.6"/>
  <!-- Stain ring from glass -->
  <circle cx="200" cy="150" r="55" fill="none" stroke="#a89880" stroke-width="3" opacity="0.5"/>
  <!-- Text on coaster -->
  <text x="200" y="145" font-family="'Georgia', serif" font-size="13" fill="#555" text-anchor="middle">THE ROYAL</text>
  <text x="200" y="162" font-family="'Georgia', serif" font-size="13" fill="#555" text-anchor="middle">CONFERENCE</text>
  <text x="200" y="179" font-family="'Georgia', serif" font-size="11" fill="#888" text-anchor="middle">HOTEL &amp; SPA</text>
  <!-- Tag hanging off -->
  <line x1="290" y1="80" x2="310" y2="50" stroke="#333" stroke-width="1.5"/>
  <circle cx="310" cy="48" r="3" fill="#333"/>
  <rect x="290" y="32" width="80" height="34" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="330" y="51" font-family="monospace" font-size="10" fill="#000" text-anchor="middle" font-weight="bold">EVIDENCE B</text>
</svg>
